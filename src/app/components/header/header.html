<header class="site-header">
  <div class="container nav">
    <a routerLink="/" class="brand" aria-label="Shepherds Inn home">
      <img
        src="/images/shepherds-inn-logo-reverse.svg"
        alt="Shepherds Inn Assisted Living"
        class="logo"
      />
    </a>

    <div class="mobile-nav-row">
      <nav class="main-nav" aria-label="Main navigation">
        <a
          routerLink="/"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          ariaCurrentWhenActive="page"
        >
          Home
        </a>
        <a routerLink="/about" routerLinkActive="active" ariaCurrentWhenActive="page">About</a>
        <a routerLink="/services" routerLinkActive="active" ariaCurrentWhenActive="page">
          Services
        </a>
        <a routerLink="/photos" routerLinkActive="active" ariaCurrentWhenActive="page">Photos</a>
        <a routerLink="/contact" routerLinkActive="active" ariaCurrentWhenActive="page">
          Contact
        </a>
      </nav>

      <app-facebook-link></app-facebook-link>
    </div>
  </div>
</header>
