<footer class="site-footer">
  <div class="container footer-content">
    <div class="footer-column footer-address">
      <h4>The Shepherds Inn</h4>
      <a
        [href]="siteInfo.googleMapsUrl"
        target="_blank"
        rel="noopener"
      >
        {{ siteInfo.addressLine1 }}<br />
        {{ siteInfo.cityStateZip }}
      </a>
    </div>

    <div class="footer-column footer-contact">
      <!-- <h4>Contact</h4> -->

      <p>
        <a [href]="'tel:' + siteInfo.phone">
          {{ siteInfo.phone }}
        </a>
      </p>

      <p>
        <a [href]="'mailto:' + siteInfo.email">
          {{ siteInfo.email }}
        </a>
      </p>
    </div>

    <div class="footer-column footer-social">
      <app-facebook-link></app-facebook-link>
    </div>

    <div class="footer-column footer-managed">
      <p>Proudly managed By</p>

      <a
        [href]="siteInfo.nextLevelUrl"
        target="_blank"
        rel="noopener"
      >
        <img
          src="/images/next-level-logo-inverted.png"
          alt="Next Level Senior Living"
          class="footer-nls-logo"
        />
      </a>
    </div>
  </div>
</footer>
