<div class="modal-backdrop" (click)="closeForm()">
  <div class="message-modal" (click)="$event.stopPropagation()">
    <button type="button" class="modal-close" aria-label="Close message form" (click)="closeForm()">
      ×
    </button>

    <h2>{{ formTitle }}</h2>

    <label>
      <div class="label-row">
        <span>Name</span>
        @if (errors.name) {
          <span class="form-error-inline">{{ errors.name }}</span>
        }
      </div>
      <input type="text" [(ngModel)]="form.name" (blur)="validateName()" />
    </label>

    <label>
      <div class="label-row">
        <span>Phone</span>
        @if (errors.phone) {
          <span class="form-error-inline">{{ errors.phone }}</span>
        }
        @if (errors.contact) {
          <span class="form-error-inline">{{ errors.contact }}</span>
        }
      </div>

      <div class="phone-input">
        <span class="country-code">1-</span>
        <input
          type="tel"
          maxlength="14"
          placeholder="(555) 555-5555"
          [(ngModel)]="form.phone"
          (blur)="formatPhoneNumber(); validatePhone()"
        />
      </div>
    </label>

    <label>
      <div class="label-row">
        <span>Email</span>
        @if (errors.email) {
          <span class="form-error-inline">{{ errors.email }}</span>
        }
      </div>
      <input type="email" [(ngModel)]="form.email" (blur)="validateEmail()" />
    </label>

    <fieldset>
      <legend>Preferred method of contact</legend>

      <label class="radio-option">
        <input type="radio" name="preferredContact" value="Call" [(ngModel)]="form.preferredContact" />
        Call
      </label>

      <label class="radio-option">
        <input type="radio" name="preferredContact" value="Email" [(ngModel)]="form.preferredContact" />
        Email
      </label>
    </fieldset>

    <label>
      <div class="label-row">
        <span>Message</span>
        @if (errors.message) {
          <span class="form-error-inline">{{ errors.message }}</span>
        }
      </div>
      <textarea rows="5" [(ngModel)]="form.message" (blur)="validateMessage()"></textarea>
    </label>

    <button type="button" class="button primary modal-submit" (click)="submitForm()">
      {{ submitButtonText }}
    </button>
  </div>
</div>
