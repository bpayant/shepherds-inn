<div class="modal-backdrop">
  <div class="message-modal">
    <button type="button" class="modal-close" (click)="closeForm()">×</button>

    <h2>{{ formTitle }}</h2>

    @if (successMessage) {
      <p class="form-success">{{ successMessage }}</p>
    }

    @if (submitError) {
      <p class="form-submit-error">{{ submitError }}</p>
    }

    <form (ngSubmit)="submitForm()">
      <label>
        <span class="label-row">
          Name
          @if (errors.name) {
            <span class="form-error-inline">{{ errors.name }}</span>
          }
        </span>

        <input
          type="text"
          name="name"
          [(ngModel)]="form.name"
          (blur)="validateName()"
        />
      </label>

      <label>
        <span class="label-row">
          Phone
          @if (errors.phone) {
            <span class="form-error-inline">{{ errors.phone }}</span>
          }
          @if (errors.contact) {
            <span class="form-error-inline">{{ errors.contact }}</span>
          }
        </span>

        <div class="phone-input">
          <span class="country-code">1-</span>
          <input
            type="tel"
            name="phone"
            [(ngModel)]="form.phone"
            (blur)="formatPhoneNumber(); validatePhone(); validateContactMethodProvided()"
          />
        </div>
      </label>

      <label>
        <span class="label-row">
          Email
          @if (errors.email) {
            <span class="form-error-inline">{{ errors.email }}</span>
          }
        </span>

        <input
          type="email"
          name="email"
          [(ngModel)]="form.email"
          (blur)="validateEmail(); validateContactMethodProvided()"
        />
      </label>

      <fieldset>
        <legend>Preferred method of contact</legend>

        <label class="radio-option">
          <input
            type="radio"
            name="preferredContact"
            value="Call"
            [(ngModel)]="form.preferredContact"
          />
          Call
        </label>

        <label class="radio-option">
          <input
            type="radio"
            name="preferredContact"
            value="Email"
            [(ngModel)]="form.preferredContact"
          />
          Email
        </label>
      </fieldset>

      <label>
        <span class="label-row">
          Message
          @if (errors.message) {
            <span class="form-error-inline">{{ errors.message }}</span>
          }
        </span>

        <textarea
          name="message"
          rows="5"
          [(ngModel)]="form.message"
          (blur)="validateMessage()"
        ></textarea>
      </label>

      <input
        type="text"
        name="website"
        class="website-field"
        [(ngModel)]="form.website"
        tabindex="-1"
        autocomplete="off"
      />

      <button
        type="submit"
        class="button primary modal-submit"
        [disabled]="isSubmitting"
      >
        {{ isSubmitting ? 'Sending...' : submitButtonText }}
      </button>
    </form>
  </div>
</div>
