<div class="modal-backdrop">
  <div class="message-modal">
    <button type="button" class="modal-close" (click)="closeForm()">×</button>

    @if (successMessage) {
      <div class="thank-you-panel">
        <h2>Thank you</h2>

        <p>{{ successMessage }}</p>

        <button
          type="button"
          class="button primary modal-submit"
          (click)="closeForm()"
        >
          Close
        </button>
      </div>
    }
    @else {
      <h2>{{ formTitle }}</h2>

      @if (submitError) {
        <p class="form-submit-error">{{ submitError }}</p>
      }

      <form (ngSubmit)="submitForm()">
        <label>
          <span class="label-row">
            Name
            @if (errors.name) {
              <span class="form-error-inline">{{ errors.name }}</span>
            }
          </span>

          <input
            type="text"
            name="name"
            [(ngModel)]="form.name"
            (blur)="validateName()"
          />
        </label>

        <label>
          <span class="label-row">
            Phone
            @if (errors.phone) {
              <span class="form-error-inline">{{ errors.phone }}</span>
            }
            @if (errors.contact) {
              <span class="form-error-inline">{{ errors.contact }}</span>
            }
          </span>

          <div class="phone-input">
            <span class="country-code">1-</span>
            <input
              type="tel"
              name="phone"
              [(ngModel)]="form.phone"
              (blur)="formatPhoneNumber(); validateContactMethodProvided()"
            />
          </div>
        </label>

        <label>
          <span class="label-row">
            Email
            @if (errors.email) {
              <span class="form-error-inline">{{ errors.email }}</span>
            }
          </span>

          <input
            type="email"
            name="email"
            [(ngModel)]="form.email"
            (blur)="validateContactMethodProvided()"
          />
        </label>

        <fieldset>
          <legend>Preferred method of contact</legend>

          <label class="radio-option">
            <input
              type="radio"
              name="preferredContact"
              value="Call"
              [(ngModel)]="form.preferredContact"
              (change)="validateContactMethodProvided()"
            />
            Call
          </label>

          <label class="radio-option">
            <input
              type="radio"
              name="preferredContact"
              value="Email"
              [(ngModel)]="form.preferredContact"
              (change)="validateContactMethodProvided()"
            />
            Email
          </label>
        </fieldset>

        <label>
          <span class="label-row">
            Message
            @if (errors.message) {
              <span class="form-error-inline">{{ errors.message }}</span>
            }
          </span>

          <textarea
            name="message"
            rows="5"
            [(ngModel)]="form.message"
            (blur)="validateMessage()"
          ></textarea>
        </label>

        <input
          type="text"
          name="website"
          class="website-field"
          [(ngModel)]="form.website"
          tabindex="-1"
          autocomplete="off"
        />

        <button
          type="submit"
          class="button primary modal-submit"
          [disabled]="isSubmitting"
        >
          {{ isSubmitting ? 'Sending...' : submitButtonText }}
        </button>
      </form>
    }
  </div>
</div>
