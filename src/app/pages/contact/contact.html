<section class="contact-page">
  <div class="container contact-grid">
    <div class="contact-info">
      <p class="section-eyebrow">Contact Shepherds Inn</p>
      <h1>We’d love to<br />
        hear from you!</h1>

      <div class="contact-card">
        <h2>The Shepherds Inn<br />
            Assisted Living</h2>

        <p>
          <strong>Address</strong><br />
          <a
            class="address-link"
            [href]="siteInfo.googleMapsUrl"
            target="_blank"
            rel="noopener noreferrer"
          >
            {{ siteInfo.addressLine1 }}<br />
            {{ siteInfo.cityStateZip }}
          </a>
        </p>

        <p>
          <strong>Phone</strong><br />
          <a 
            class="address-link"
            [href]="'tel:' + siteInfo.phone"
          >
            {{ siteInfo.phone }}
          </a>
        </p>

        <p>
          <strong>Email</strong><br />
          <a 
            class="address-link"
            [href]="'mailto:' + siteInfo.email"
          >
            {{ siteInfo.email }}
          </a>
        </p>

        <div class="contact-actions">
          <a
            class="button primary contact-button"
            [href]="'mailto:' + siteInfo.email + '?subject=Tour Request'"
          >
            Request a Tour
          </a>

          <button
            type="button"
            class="button secondary contact-button"
            (click)="showMessageForm = true"
          >
            Send us a Message
          </button>

          @if (showMessageForm) {
            <app-message-form
              formTitle="Send Us a Message"
              defaultSubject="General Inquiry"
              submitButtonText="Send Message"
              (close)="showMessageForm = false">
            </app-message-form>
          }
        </div>

        <a
          class="button secondary contact-button"
          [href]="siteInfo.googleMapsDirectionsUrl"
          target="_blank"
          rel="noopener"
        >
          Get Directions
        </a>
      </div>
    </div>

    <div class="map-card">
      <iframe
        title="Map to Shepherds Inn Assisted Living"
        [src]="googleMapsEmbedUrl"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
  </div>
</section>
