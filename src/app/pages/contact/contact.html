<section class="contact-page">
  <div class="container contact-grid">
    <div class="contact-info">
      <div class="contact-intro">
        <p class="section-eyebrow">Contact Shepherds Inn</p>
        <div class="contact-heading-accent">
          <h1 class="page-title">
            We’d love to<br />
            hear from you!
          </h1>
        </div>
      </div>

      <div class="contact-card">
        <h2 class="section-title contact-card-title">
          <span class="contact-card-title__name">The Shepherds Inn</span>
          <span class="contact-card-title__type">Assisted Living</span>
        </h2>

        <p>
          <strong>Address</strong><br />
          <a
            class="address-link"
            [href]="siteInfo.googleMapsUrl"
            target="_blank"
            rel="noopener noreferrer"
          >
            {{ siteInfo.addressLine1 }}<br />
            {{ siteInfo.cityStateZip }}
          </a>
        </p>

        <p>
          <strong>Phone</strong><br />
          <a class="address-link" [href]="'tel:' + siteInfo.phone">
            {{ siteInfo.phone }}
          </a>
        </p>

        <p>
          <strong>Email</strong><br />
          <a class="address-link" [href]="'mailto:' + siteInfo.email">
            {{ siteInfo.email }}
          </a>
        </p>

        <div class="contact-actions">
          <button
            type="button"
            class="button button-primary contact-button"
            (click)="showScheduleVisitForm = true"
          >
            Schedule a Visit
          </button>

          @if (showScheduleVisitForm) {
            <app-schedule-visit-form
              (close)="showScheduleVisitForm = false"
            ></app-schedule-visit-form>
          }

          <button
            type="button"
            class="button button-secondary contact-button contact-secondary-button"
            (click)="showMessageForm = true"
          >
            Send us a Message
          </button>

          @if (showMessageForm) {
            <app-message-form
              formTitle="Send us a Message"
              defaultSubject="General Inquiry"
              submitButtonText="Send Message"
              (close)="showMessageForm = false"
            >
            </app-message-form>
          }
        </div>

        <a
          class="button button-secondary contact-button contact-secondary-button"
          [href]="siteInfo.googleMapsDirectionsUrl"
          target="_blank"
          rel="noopener"
        >
          Get Directions
        </a>
      </div>
    </div>

    <div class="map-card">
      <iframe
        title="Map to Shepherds Inn Assisted Living"
        [src]="googleMapsEmbedUrl"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      >
      </iframe>
    </div>
  </div>
</section>
